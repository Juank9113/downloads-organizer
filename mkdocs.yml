site_name: Downloads Organizer
site_description: Organizador automático de archivos para la carpeta de Descargas
site_author: Juan Carlos Blanco Ruiz
site_url: https://juank9113.github.io/downloads-organizer/

repo_name: Juank9113/downloads-organizer
repo_url: https://github.com/Juank9113/downloads-organizer

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo claro
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo oscuro
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest

nav:
  - Inicio: index.md
  - Instalacion: installation.md
  - Uso: usage.md
  - Personalizacion: customization.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed
  - toc:
      permalink: true
