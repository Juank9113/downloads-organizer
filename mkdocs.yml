site_name: Downloads Organizer
site_description: Organizador automatico de archivos para la carpeta de Descargas con GUI profesional
site_author: Juan Carlos Blanco Ruiz
site_url: https://juank9113.github.io/downloads-organizer/

repo_name: Juank9113/downloads-organizer
repo_url: https://github.com/Juank9113/downloads-organizer

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo claro
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo oscuro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - search.suggest
    - search.highlight

nav:
  - Inicio: index.md
  - Instalacion: installation.md
  - Guia de uso: usage.md
  - Interfaz Grafica: gui.md
  - Modo Simulacion: simulation.md
  - Estadisticas: stats.md
  - Personalizacion: customization.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Juank9113/downloads-organizer
    - icon: fontawesome/brands/python
      link: https://www.python.org/
  generator: false

copyright: Copyright &copy; 2024 Juan Carlos Blanco Ruiz